name: PR Closed Message

on:
  pull_request_target:
    types:
      - closed

jobs:
  comment:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Comment on merged PR
        if: github.event.pull_request.merged == true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "🎉 Congratulations!\n\nThank you for your contribution to CampusCompass.\n\n✅ Your pull request has been successfully merged.\n\nWe appreciate your effort and look forward to more contributions from you.\n\nHappy coding! 🚀"
            })

      - name: Comment on closed PR
        if: github.event.pull_request.merged == false
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "👋 Thank you for contributing to CampusCompass.\n\nThis pull request has been closed without merging.\n\nIf you'd like to continue working on it, feel free to discuss the feedback with maintainers and submit improvements.\n\nThank you for your effort! 🚀"
            })
