name: Greetings

on:
  issues:
    types: [opened]

  pull_request_target:
    types: [opened]

jobs:
  greet-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Welcome Issue Creator
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "👋 Thank you for opening an issue in CampusCompass!\n\nOur maintainers will review it soon.\n\nPlease ensure:\n- The issue is clearly described\n- Relevant screenshots/logs are attached\n- Existing issues have been checked for duplicates\n\nHappy contributing! 🚀"
            });

  greet-pr:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Welcome PR Contributor
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "🎉 Thank you for your contribution to CampusCompass!\n\nWe appreciate your effort in improving the project.\n\nBefore review, please ensure:\n- All checks are passing\n- Changes are tested\n- The PR is linked to an issue (if applicable)\n- The PR description is complete\n\nA maintainer will review your contribution shortly.\n\nHappy contributing! 🚀"
            });
